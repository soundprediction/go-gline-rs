name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-gliner2:
    name: Build GLiNER2 native lib (${{ matrix.target_dir }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_dir: linux-amd64
          - os: macos-latest
            target_dir: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build gliner2_binding + bundle onnxruntime
        run: make gliner2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gliner2-lib-${{ matrix.target_dir }}
          path: pkg/gliner2/lib/

  test-go:
    name: Test Go (${{ matrix.target_dir }})
    needs: build-gliner2
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_dir: linux-amd64
          - os: macos-latest
            target_dir: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download GLiNER2 Artifact
        uses: actions/download-artifact@v4
        with:
          name: gliner2-lib-${{ matrix.target_dir }}
          path: pkg/gliner2/lib

      # -short skips the smoke test that downloads ~1GB of model weights.
      - name: Run Go Tests
        run: go test -short -v ./pkg/gliner2/...
